name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install core dependencies (no optional heavy packages)
        run: |
          pip install pandas numpy aiohttp pytest

      - name: Run unit tests
        run: |
          python -m pytest tests/test_strategies.py -v --tb=short

      - name: Check for integration test flag
        run: |
          echo "To run integration tests locally:"
          echo "  RUN_INTEGRATION_TESTS=true python -m pytest tests/test_strategies.py -v"
