services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # Mount secrets file if it exists — API keys stay out of the image
      - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
